origin_light:
  name: 原色 Light
  author: Morristin <takemehands@icloud.com>

  candidate_list_layout: stacked
  text_orientation: horizontal
  inline_preedit: true
  inline_candidate: false

  font_face: "Noto Serif SC"
  font_point: 14
  label_font_face: "Noto Serif"
  label_font_point: 15
  comment_font_face: "Times New Roman, LXGW WenKai"
  comment_font_point: 13

  candidate_format: "\u2004[label].\u2002[candidate] [comment]\u2002\u2006"

  translucency: true
  mutual_exclusive: true
  border_height: 2
  border_width: 3
  corner_radius: 8
  hilited_corner_radius: 5
  surrounding_extra_expansion: 0
  shadow_size: 20
  line_spacing: 8
  base_offset: 2
  spacing: 0

  color_space: display_p3
  back_color: 0x33F6F6F6
  hilited_candidate_back_color: 0xFFED6E2F
  label_color: 0xFF808080
  hilited_candidate_label_color: 0xFFFFFFFF
  candidate_text_color: 0xFF4A4A4A
  hilited_candidate_text_color: 0xFFFFFFFF
  comment_text_color: 0xFF808080
  hilited_comment_text_color: 0xFFFFFFFF

